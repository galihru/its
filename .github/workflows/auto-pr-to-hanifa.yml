name: Auto PR to target repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      TARGET_BRANCH: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Push source branch for PR
        run: |
          BRANCH="auto-pr/${{ github.run_id }}"
          git checkout -B "$BRANCH"
          git push origin "HEAD:$BRANCH" --force

      - name: Create pull request (same repo)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          BRANCH="auto-pr/${{ github.run_id }}"
          # Create PR in the same repository (do not target external repos)
          gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$BRANCH" \
            --title "Auto PR from ${{ github.repository }}" \
            --body "Automated PR created from ${{ github.repository }} run ${{ github.run_id }}." \
            --repo "${{ github.repository }}"