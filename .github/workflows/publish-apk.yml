name: Publish APK and Manifest

on:
  push:
    branches: [ main ]

jobs:
  publish-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Android changes
        id: android_changes
        run: |
          # If this is the first commit in the branch, assume changes
          if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "android_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          git fetch --no-tags --prune
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^(web/android/|^android/)' || true)
          if [ -n "$CHANGED" ]; then
            echo "android_changed=true" >> $GITHUB_OUTPUT
          else
            echo "android_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web assets
        working-directory: web
        run: npm run build

      - name: Sync Capacitor Android project
        if: steps.android_changes.outputs.android_changed == 'true'
        working-directory: web
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Android debug APK
        if: steps.android_changes.outputs.android_changed == 'true'
        working-directory: web/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug -x lint

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH="web/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "apk_found=true" >> $GITHUB_OUTPUT
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish release with APK
        if: steps.find_apk.outputs.apk_found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: apk-${{ github.run_id }}
          name: APK build ${{ github.run_id }}
          draft: false
          prerelease: true
          files: |
            ${{ steps.find_apk.outputs.apk_path }}

      - name: Copy APK to web/dist and update manifest
        if: steps.android_changes.outputs.android_changed == 'true' && steps.find_apk.outputs.apk_found == 'true'
        run: |
          set -e
          APK_SRC="${{ steps.find_apk.outputs.apk_path }}"
          DIST_APK_DIR=web/dist/apk
          mkdir -p "$DIST_APK_DIR"
          cp "$APK_SRC" "$DIST_APK_DIR/its-latest.apk"
          # update web/dist/app-update.json fields so hosting will serve correct URL
          if [ -f web/dist/app-update.json ]; then
            node -e "const fs=require('fs');const p='web/dist/app-update.json';let j=JSON.parse(fs.readFileSync(p));j.apkUrl='https://itstelkom.web.app/apk/its-latest.apk';j.downloadUrl=j.apkUrl;j.latestUrl=j.apkUrl;j.fileName='its-latest.apk';j.sizeBytes=require('fs').statSync('web/dist/apk/its-latest.apk').size;j.updatedAt=new Date().toISOString();fs.writeFileSync(p,JSON.stringify(j,null,2));console.log('updated',p);"
          fi
      - name: Deploy to Firebase Hosting
        if: steps.android_changes.outputs.android_changed == 'true' && steps.find_apk.outputs.apk_found == 'true'
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ITSTELKOM }}
        run: |
          set -e
          # write service account JSON from secret to file and point GOOGLE_APPLICATION_CREDENTIALS at it
          echo "$FIREBASE_SA" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          npm install -g firebase-tools
          firebase deploy --only hosting --project itstelkom --non-interactive

      - name: Write app-update manifest
        if: steps.find_apk.outputs.apk_found == 'true'
        run: |
          mkdir -p dist/apk
          TAG=apk-${{ github.run_id }}
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/app-debug.apk"
          cat > dist/apk/app-update.json <<EOF
          {
            "version": "${{ github.run_number }}",
            "versionName": "${{ github.run_number }}",
            "url": "${APK_URL}",
            "fileName": "app-debug.apk",
            "notes": ["Automated APK upload"],
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dist/apk/app-update.json
          git commit -m "chore(ci): publish apk manifest [skip ci]" || true
          git push origin HEAD:main || true

      - name: Upload workflow artifact (APK manifest)
        if: steps.find_apk.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-update-manifest
          path: dist/apk/app-update.json

      - name: Notify (no APK)
        if: steps.find_apk.outputs.apk_found == 'false'
        run: echo "No APK found at web/android/app/build/outputs/apk/debug/app-debug.apk; please build artifact first."
