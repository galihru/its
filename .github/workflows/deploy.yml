name: Deploy ITS Maps

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - "controller/**"
      - "README.md"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pages_enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - name: Check GitHub Pages status
        id: pages
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.get(context.repo);
            const enabled = data.has_pages === true;
            core.setOutput("enabled", enabled ? "true" : "false");

            if (!enabled) {
              const settingsUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/settings/pages`;
              core.notice(`GitHub Pages belum aktif. Deploy akan di-skip sampai Pages diaktifkan di ${settingsUrl}`);
              await core.summary
                .addHeading("GitHub Pages belum aktif")
                .addRaw(`Aktifkan di ${settingsUrl} lalu pilih **GitHub Actions** sebagai source.`)
                .write();
            }

  build:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        if: needs.preflight.outputs.pages_enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Upload artifact
        if: needs.preflight.outputs.pages_enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    if: needs.preflight.outputs.pages_enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [preflight, build]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
